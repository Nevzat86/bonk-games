<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Finn bokstaven – LearningKidz</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(145deg, #E8F4FD, #d0e8f7);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
    }

    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 12px 16px;
    }

    .progress {
      display: flex;
      gap: 5px;
      align-items: center;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 100px;
      background: #c0dff0;
      transition: all 0.3s;
    }

    .dot.active {
      width: 20px;
      background: #4DABF7;
    }

    .dot.done {
      background: #69DB7C;
    }

    .score-badge {
      background: #FFF3BF;
      color: #E67700;
      font-weight: 800;
      font-size: 14px;
      padding: 6px 14px;
      border-radius: 100px;
    }

    .instruction {
      font-size: 20px;
      font-weight: 800;
      color: #1971C2;
      margin: 8px 0;
    }

    .target-card {
      width: 130px;
      height: 130px;
      border-radius: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin: 12px 0;
      box-shadow: 0 6px 24px rgba(0,0,0,0.12);
      animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes popIn {
      0% { transform: scale(0.5); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    .target-letter {
      font-size: 72px;
      font-weight: 900;
      color: #fff;
      line-height: 1;
    }

    .target-example {
      font-size: 14px;
      color: rgba(255,255,255,0.85);
      margin-top: 4px;
      font-weight: 600;
    }

    .options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin: 16px 0;
      padding: 0 24px;
      width: 100%;
      max-width: 300px;
    }

    .option-btn {
      aspect-ratio: 1;
      border-radius: 20px;
      border: 3px solid transparent;
      font-size: 38px;
      font-weight: 900;
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
      animation: slideUp 0.3s ease-out both;
    }

    .option-btn:nth-child(1) { animation-delay: 0.05s; }
    .option-btn:nth-child(2) { animation-delay: 0.1s; }
    .option-btn:nth-child(3) { animation-delay: 0.15s; }
    .option-btn:nth-child(4) { animation-delay: 0.2s; }

    @keyframes slideUp {
      0% { transform: translateY(20px); opacity: 0; }
      100% { transform: translateY(0); opacity: 1; }
    }

    .option-btn:active { transform: scale(0.95); }

    .option-btn.correct {
      border-color: #2B8A3E;
      animation: pulse 0.4s ease;
    }

    .option-btn.wrong {
      animation: shake 0.4s ease;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.12); }
      100% { transform: scale(1); }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-8px); }
      40% { transform: translateX(8px); }
      60% { transform: translateX(-6px); }
      80% { transform: translateX(6px); }
    }

    .feedback {
      font-size: 20px;
      font-weight: 800;
      height: 28px;
      transition: opacity 0.2s;
    }

    .feedback.correct { color: #2B8A3E; }
    .feedback.wrong { color: #E03131; }

    /* Result screen */
    .result {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 24px;
      gap: 12px;
    }

    .result.show { display: flex; }
    .game.hide { display: none; }

    .result-emoji { font-size: 64px; }
    .result-title { font-size: 28px; font-weight: 900; color: #1971C2; }
    .result-score { font-size: 18px; color: #555; font-weight: 600; }
    .result-stars { font-size: 36px; letter-spacing: 4px; }

    .play-again {
      margin-top: 12px;
      padding: 14px 32px;
      background: #4DABF7;
      color: #fff;
      border: none;
      border-radius: 100px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s;
    }

    .play-again:hover { transform: translateY(-2px); }
  </style>
</head>
<body>

<div class="game" id="game">
  <div class="top-bar">
    <div class="progress" id="progress"></div>
    <div class="score-badge" id="score">0</div>
  </div>

  <div class="instruction">Finn bokstaven!</div>

  <div class="target-card" id="targetCard">
    <div class="target-letter" id="targetLetter"></div>
    <div class="target-example" id="targetExample"></div>
  </div>

  <div class="feedback" id="feedback">&nbsp;</div>

  <div class="options" id="options"></div>
</div>

<div class="result" id="result">
  <div class="result-emoji">&#x1F389;</div>
  <div class="result-title" id="resultTitle"></div>
  <div class="result-score" id="resultScore"></div>
  <div class="result-stars" id="resultStars"></div>
  <button class="play-again" onclick="startGame()">Spill igjen</button>
</div>

<script>
  const LETTERS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
  const EXAMPLES = {
    A: ['&#x1F34E;', 'Eple'], B: ['&#x1F43B;', 'Bj\u00f8rn'], C: ['&#x1F697;', 'Bil'],
    D: ['&#x1F42C;', 'Delfin'], E: ['&#x1F418;', 'Elefant'], F: ['&#x1F41F;', 'Fisk'],
    G: ['&#x1F410;', 'Geit'], H: ['&#x1F436;', 'Hund'], I: ['&#x1F9CA;', 'Is'],
    J: ['&#x1F30D;', 'Jord'], K: ['&#x1F431;', 'Katt'], L: ['&#x1F981;', 'L\u00f8ve'],
    M: ['&#x1F42D;', 'Mus'], N: ['&#x1F984;', 'Narhval'], O: ['&#x1F9C0;', 'Ost'],
    P: ['&#x1F427;', 'Pingvin'], Q: ['', 'Q'], R: ['&#x1F98A;', 'Rev'],
    S: ['&#x2600;&#xFE0F;', 'Sol'], T: ['&#x1F422;', 'Skilpadde'], U: ['&#x1F989;', 'Ugle'],
    V: ['&#x1F43A;', 'Ulv'], W: ['', 'W'], X: ['', 'X'],
    Y: ['', 'Y'], Z: ['&#x1F993;', 'Sebra']
  };

  const COLORS = [
    '#4DABF7', '#FF6B6B', '#51CF66', '#FCC419',
    '#CC5DE8', '#FF922B', '#20C997', '#748FFC'
  ];

  const TOTAL_ROUNDS = 10;
  let round, score, correctCount, gameLetters, locked;

  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function startGame() {
    round = 0;
    score = 0;
    correctCount = 0;
    locked = false;
    gameLetters = shuffle(LETTERS).slice(0, TOTAL_ROUNDS);
    document.getElementById('game').classList.remove('hide');
    document.getElementById('result').classList.remove('show');
    renderRound();
  }

  function renderRound() {
    locked = false;
    const fb = document.getElementById('feedback');
    fb.innerHTML = '&nbsp;';
    fb.className = 'feedback';

    // Progress dots
    const prog = document.getElementById('progress');
    prog.innerHTML = '';
    for (let i = 0; i < TOTAL_ROUNDS; i++) {
      const dot = document.createElement('div');
      dot.className = 'dot' + (i < round ? ' done' : '') + (i === round ? ' active' : '');
      prog.appendChild(dot);
    }

    document.getElementById('score').textContent = score;

    const target = gameLetters[round];
    const color = COLORS[round % COLORS.length];
    const card = document.getElementById('targetCard');
    card.style.background = color;
    card.style.animation = 'none';
    card.offsetHeight; // reflow
    card.style.animation = 'popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1)';

    document.getElementById('targetLetter').textContent = target;
    const ex = EXAMPLES[target];
    document.getElementById('targetExample').innerHTML = ex[0] + ' ' + ex[1];

    // Generate 3 wrong + 1 correct
    const wrong = shuffle(LETTERS.filter(l => l !== target)).slice(0, 3);
    const options = shuffle([target, ...wrong]);

    const optContainer = document.getElementById('options');
    optContainer.innerHTML = '';
    options.forEach((letter, i) => {
      const btn = document.createElement('button');
      btn.className = 'option-btn';
      btn.textContent = letter;
      btn.style.background = COLORS[(round + i + 2) % COLORS.length];
      btn.style.animation = 'none';
      btn.offsetHeight;
      btn.style.animation = `slideUp 0.3s ease-out ${0.05 + i * 0.05}s both`;
      btn.onclick = () => handleAnswer(btn, letter, target);
      optContainer.appendChild(btn);
    });
  }

  function handleAnswer(btn, chosen, target) {
    if (locked) return;
    const fb = document.getElementById('feedback');

    if (chosen === target) {
      locked = true;
      btn.classList.add('correct');
      fb.textContent = 'Riktig! \u2713';
      fb.className = 'feedback correct';
      score += 10;
      correctCount++;
      document.getElementById('score').textContent = score;

      setTimeout(() => {
        round++;
        if (round >= TOTAL_ROUNDS) {
          showResult();
        } else {
          renderRound();
        }
      }, 800);
    } else {
      btn.classList.add('wrong');
      fb.textContent = 'Pr\u00f8v igjen!';
      fb.className = 'feedback wrong';
      setTimeout(() => btn.classList.remove('wrong'), 400);
    }
  }

  function showResult() {
    document.getElementById('game').classList.add('hide');
    const res = document.getElementById('result');
    res.classList.add('show');

    const stars = Math.min(Math.ceil((correctCount / TOTAL_ROUNDS) * 3), 3);
    const titles = ['Bra jobba!', 'Fantastisk!', 'Superstjerne!'];

    document.getElementById('resultTitle').textContent = titles[Math.min(stars - 1, 2)];
    document.getElementById('resultScore').textContent = correctCount + ' av ' + TOTAL_ROUNDS + ' riktige';
    document.getElementById('resultStars').textContent =
      '\u2B50'.repeat(stars) + '\u2606'.repeat(3 - stars);
  }

  startGame();
</script>
</body>
</html>
